services:
  claude-memory:
    build: .
    ports:
      - "8787:8787"
    volumes:
      - memory-data:/data
    environment:
      - MEMORY_DB_PATH=/data/memory.db
      - MEMORY_MODEL=all-MiniLM-L6-v2
    command: ["--transport", "sse", "--port", "8787"]

volumes:
  memory-data:
    driver: local
